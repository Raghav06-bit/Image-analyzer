<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vizion — AI Image Analyzer</title>
  <meta name="description" content="Upload any image and let AI tell you what it sees. Powered by Google Gemini — accurate, detailed image analysis." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated gradient orbs -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="14" cy="14" r="6" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="14" cy="14" r="2" fill="currentColor"/>
          <line x1="14" y1="1" x2="14" y2="5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="14" y1="23" x2="14" y2="27" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="1" y1="14" x2="5" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="23" y1="14" x2="27" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">Vizion</span>
      </div>

      <!-- API Key (compact in header) -->
      <div class="header-controls">
        <div class="api-key-compact" id="api-key-compact">
          <div class="api-key-status" id="api-key-status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">No API key</span>
          </div>
          <button id="key-toggle-btn" class="key-toggle-btn">
            <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
              <path fill-rule="evenodd" d="M8 7a5 5 0 1 1 3.61 4.804l-1.903 1.903A.75.75 0 0 1 9.178 14H8v1.25a.75.75 0 0 1-.75.75h-1.5v1.25a.75.75 0 0 1-.75.75H2.75a.75.75 0 0 1-.75-.75v-2.086c0-.199.079-.39.22-.53l4.243-4.243A5 5 0 0 1 8 7Zm5-3a.75.75 0 0 0 0 1.5A1.5 1.5 0 0 1 14.5 7 .75.75 0 0 0 16 7a3 3 0 0 0-3-3Z" clip-rule="evenodd"/>
            </svg>
            <span id="key-btn-text">Set Key</span>
          </button>
        </div>

        <!-- Model selector -->
        <select id="model-select" class="model-select">
          <option value="gemini-2.0-flash-lite">Flash Lite</option>
          <option value="gemini-2.0-flash">Flash 2.0</option>
          <option value="gemini-2.5-flash">Flash 2.5</option>
        </select>
      </div>
    </div>

    <!-- Expandable API key input -->
    <div class="api-key-drawer hidden" id="api-key-drawer">
      <div class="api-key-drawer-inner">
        <input
          type="password"
          id="api-key-input"
          class="api-key-input"
          placeholder="Paste your Gemini API key…"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="save-key-btn" class="save-key-btn">Save</button>
      </div>
      <p class="api-key-hint">
        Get a free key from <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a> — stored locally only
      </p>
    </div>
  </header>

  <!-- Main Split Layout -->
  <main class="main-layout">
    <!-- Left: Upload Panel -->
    <section class="panel panel-left">
      <div class="panel-inner">
        <div id="drop-zone" class="drop-zone">
          <input type="file" id="file-input" accept="image/*" hidden />
          
          <!-- Default state -->
          <div id="upload-prompt" class="upload-prompt">
            <div class="upload-icon-wrapper">
              <svg class="upload-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M24 32V16M24 16L18 22M24 16L30 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8 32C8 36.4183 11.5817 40 16 40H32C36.4183 40 40 36.4183 40 32" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>
            <p class="upload-text">Drop image here or <span class="upload-link">browse</span></p>
            <p class="upload-hint">JPG, PNG, WebP — up to 10MB</p>
          </div>

          <!-- Preview state -->
          <div id="preview-container" class="preview-container hidden">
            <img id="preview-image" class="preview-image" alt="Uploaded preview" />
          </div>
        </div>

        <!-- Actions below image -->
        <div class="upload-actions" id="upload-actions">
          <button id="clear-btn" class="action-btn action-btn-secondary hidden">
            <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
              <path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 1 0 .23 1.482l.149-.022.841 10.518A2.75 2.75 0 0 0 7.596 19h4.807a2.75 2.75 0 0 0 2.742-2.53l.841-10.52.149.023a.75.75 0 0 0 .23-1.482A41.03 41.03 0 0 0 14 4.193V3.75A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z" clip-rule="evenodd"/>
            </svg>
            Remove
          </button>
          <button id="analyze-btn" class="action-btn action-btn-primary hidden" disabled>
            <span class="analyze-btn-text">
              <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
                <path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/>
                <path fill-rule="evenodd" d="M.664 10.59a1.651 1.651 0 0 1 0-1.186A10.004 10.004 0 0 1 10 3c4.257 0 7.893 2.66 9.336 6.41.147.381.146.804 0 1.186A10.004 10.004 0 0 1 10 17c-4.257 0-7.893-2.66-9.336-6.41ZM14 10a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z" clip-rule="evenodd"/>
              </svg>
              Analyze
            </span>
            <span class="analyze-btn-loader hidden">
              <span class="spinner"></span>
              Analyzing…
            </span>
          </button>
        </div>
      </div>
    </section>

    <!-- Right: Results Panel -->
    <section class="panel panel-right">
      <div class="panel-inner">
        <!-- Empty state -->
        <div id="empty-state" class="empty-state">
          <div class="empty-state-icon">
            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M6 34l10-10 6 6 8-10 12 14" stroke-linecap="round" stroke-linejoin="round"/>
              <rect x="4" y="4" width="40" height="40" rx="6" />
              <circle cx="16" cy="16" r="4" />
            </svg>
          </div>
          <h2 class="empty-state-title">Upload an image to analyze</h2>
          <p class="empty-state-subtitle">AI will identify objects, scenes, and details</p>
        </div>

        <!-- Results state -->
        <div id="results-section" class="results-section hidden">
          <!-- Primary identification -->
          <div class="result-header" id="result-header">
            <div class="result-emoji" id="result-emoji"></div>
            <div>
              <h2 class="result-identification" id="result-identification"></h2>
              <span class="result-category" id="result-category"></span>
            </div>
          </div>

          <!-- Divider -->
          <div class="result-divider"></div>

          <!-- Description -->
          <div class="result-block">
            <h3 class="result-block-title">Description</h3>
            <p class="result-description" id="result-description"></p>
          </div>

          <!-- Tags -->
          <div class="result-block" id="result-tags-block">
            <h3 class="result-block-title">Tags</h3>
            <div class="result-tags" id="result-tags"></div>
          </div>

          <!-- Footer -->
          <p class="results-footer">Powered by Google Gemini</p>
        </div>

        <!-- Error state -->
        <div id="error-section" class="error-section hidden"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
